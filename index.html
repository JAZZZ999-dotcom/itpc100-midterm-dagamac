<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Profile Card</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Internal CSS -->
    <style>
        article {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            max-width: 400px;
            margin: auto;
        }
    </style>
</head>

<body>
    <header>
        <h1>TechNova Solutions</h1>
        <p>Your partner in digital innovation</p>
    </header>

    <main>
        <article>
            <h2>About Us</h2>
            <p>
                TechNova Solutions is a startup focused on building modern web applications
                and providing innovative tech solutions for businesses.
            </p>
        </article>
    </main>

    <footer>
        <p>© 2026 TechNova Solutions</p>
        <!-- Inline CSS -->
        <button style="background-color: blue; color: white; padding: 10px 20px;">
            Contact Us
        </button>
    </footer>
</body>
</html>
